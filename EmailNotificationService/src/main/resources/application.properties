spring.application.name=EmailNotificationService

server.port=8082
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

spring.kafka.consumer.group-id=createProductEvent

#нужно для обеспечения безопасности, то есть на доверенные пакеты
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.datasource.password=pass
spring.datasource.username=user
spring.datasource.url=jdbc:h2:mem:testDb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false