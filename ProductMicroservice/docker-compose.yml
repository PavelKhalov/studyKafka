services:
  kafka-0:
    image: confluentinc/cp-kafka:latest
    container_name: kafka_0
    hostname: kafka-0
    ports:
      - 29092:29092
    environment:
      CLUSTER_ID: u0wV0ULbT3uhl24O6DwEEg
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_LISTENERS: INTERNAL://:9091, EXTERNAL://:29092, CONTROLLER://:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-3:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-0:9091, EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-1:
    image: confluentinc/cp-kafka:latest
    container_name: kafka_1
    hostname: kafka-1
    ports:
      - 29094:29094
    environment:
      CLUSTER_ID: u0wV0ULbT3uhl24O6DwEEg
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_LISTENERS: INTERNAL://:9091, EXTERNAL://:29094, CONTROLLER://:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-3:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-0:9091, EXTERNAL://localhost:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-3:
    image: confluentinc/cp-kafka:latest
    container_name: kafka_3
    hostname: kafka-3
    ports:
      - 29096:29096
    environment:
      CLUSTER_ID: u0wV0ULbT3uhl24O6DwEEg
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_LISTENERS: INTERNAL://:9091, EXTERNAL://:29096, CONTROLLER://:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-3:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-0:9091, EXTERNAL://localhost:29096
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1



  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8080:8080
    container_name: kafka_ui
    hostname: kafka_ui
    depends_on:
      - kafka-0
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-0:9091
      DYNAMIC_CONFIG_ENABLED: true