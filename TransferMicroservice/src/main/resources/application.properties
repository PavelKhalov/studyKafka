spring.application.name=TransferMicroservice
server.port=8084

spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer

#Включает транзакционность для продюсеров
#Рандомное значение для того, чтобы не повторялись значения для продюсеров в репликах
spring.kafka.producer.properties.transaction-id-prefix=transfer-service-${random.value}-

#Для логов
logging.level.org.springframework.kafka.transaction.KafkaAwareTransactionManager=TRACE
logging.level.org.springframework.transaction=TRACE
logging.level.org.springframework.orm.jpa.JpaTransactionManager=TRACE
logging.level.org.apache.kafka.clients.producer.internals.TransactionManager=TRACE


spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/stud
spring.datasource.username=postgres
spring.datasource.password=postgres

#spring.jpa.hibernate.ddl-auto=update
